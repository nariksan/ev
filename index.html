
html_content = '''<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Waves Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000510;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .title {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow:
                0 0 10px rgba(0, 200, 255, 0.8),
                0 0 30px rgba(0, 200, 255, 0.6),
                0 0 60px rgba(0, 200, 255, 0.4),
                0 0 100px rgba(0, 200, 255, 0.2);
            position: relative;
        }
        .title::after {
            content: attr(data-text);
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            transform: scaleY(-1);
            opacity: 0.25;
            filter: blur(2px);
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            margin-top: 1rem;
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: rgba(150, 220, 255, 0.7);
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="content">
        <div class="title" data-text="EVGENII">EVGENII</div>
        <div class="subtitle">Digital Experience</div>
    </div>

    <script>
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // === ПАРТИКЛЫ ===
        const particles = [];
        const particleCount = 120;

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.8 + 0.2;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                this.color = Math.random() > 0.5 ? '0, 200, 255' : '0, 255, 200';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                if (this.life <= 0 || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }
            draw() {
                const alpha = (this.life / this.maxLife) * this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${alpha})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = `rgba(${this.color}, ${alpha * 0.5})`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // === ВОЛНЫ ===
        class Wave {
            constructor(yOffset, amplitude, frequency, speed, color, lineWidth) {
                this.yOffset = yOffset;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.speed = speed;
                this.color = color;
                this.lineWidth = lineWidth;
                this.phase = Math.random() * Math.PI * 2;
            }
            draw(t) {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.lineWidth;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                for (let x = 0; x <= width; x += 2) {
                    const y = this.yOffset +
                        Math.sin(x * this.frequency + t * this.speed + this.phase) * this.amplitude +
                        Math.sin(x * this.frequency * 0.5 + t * this.speed * 0.7) * this.amplitude * 0.5;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        const waves = [
            new Wave(height * 0.25, 40, 0.003, 1.2, 'rgba(0, 255, 200, 0.4)', 2),
            new Wave(height * 0.25, 35, 0.004, 1.0, 'rgba(0, 200, 255, 0.5)', 2.5),
            new Wave(height * 0.75, 50, 0.0025, 0.8, 'rgba(0, 255, 255, 0.3)', 1.5),
            new Wave(height * 0.75, 45, 0.0035, 1.1, 'rgba(100, 200, 255, 0.4)', 2),
            new Wave(height * 0.5, 30, 0.005, 1.5, 'rgba(0, 220, 255, 0.2)', 1),
        ];

        // === ЛИНИИ ВОЛН (как на фото — множество тонких линий) ===
        class WaveLines {
            constructor(yBase, count, color) {
                this.yBase = yBase;
                this.count = count;
                this.color = color;
                this.lines = [];
                for (let i = 0; i < count; i++) {
                    this.lines.push({
                        offset: (i / count) * 60 - 30,
                        amp: 20 + Math.random() * 25,
                        freq: 0.002 + Math.random() * 0.003,
                        speed: 0.5 + Math.random() * 1.5,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }
            draw(t) {
                this.lines.forEach((line, i) => {
                    ctx.beginPath();
                    const alpha = 0.15 + (i / this.count) * 0.35;
                    ctx.strokeStyle = this.color.replace('ALPHA', alpha);
                    ctx.lineWidth = 1;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = this.color.replace('ALPHA', alpha * 0.5);

                    for (let x = 0; x <= width; x += 3) {
                        const y = this.yBase + line.offset +
                            Math.sin(x * line.freq + t * line.speed + line.phase) * line.amp;
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                });
            }
        }

        const waveLinesTop = new WaveLines(height * 0.28, 12, 'rgba(0, 255, 220, ALPHA)');
        const waveLinesBottom = new WaveLines(height * 0.72, 12, 'rgba(0, 200, 255, ALPHA)');

        // === БЛИКИ / ЛИНЗЫ ===
        const flares = [];
        for (let i = 0; i < 6; i++) {
            flares.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 80 + 40,
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.3,
                opacity: Math.random() * 0.15 + 0.05,
                hue: Math.random() > 0.5 ? 180 : 160
            });
        }

        function drawFlare(flare) {
            const gradient = ctx.createRadialGradient(
                flare.x, flare.y, 0,
                flare.x, flare.y, flare.size
            );
            gradient.addColorStop(0, `hsla(${flare.hue}, 100%, 70%, ${flare.opacity})`);
            gradient.addColorStop(0.5, `hsla(${flare.hue}, 100%, 50%, ${flare.opacity * 0.5})`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(flare.x, flare.y, flare.size, 0, Math.PI * 2);
            ctx.fill();
        }

        // === ГЛАВНЫЙ ЦИКЛ ===
        function animate() {
            time += 0.016;

            // Очистка с trail-эффектом
            ctx.fillStyle = 'rgba(0, 5, 16, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // Фоновый градиент
            const bgGradient = ctx.createRadialGradient(
                width * 0.5, height * 0.5, 0,
                width * 0.5, height * 0.5, width * 0.8
            );
            bgGradient.addColorStop(0, 'rgba(0, 30, 60, 0.3)');
            bgGradient.addColorStop(0.5, 'rgba(0, 10, 30, 0.1)');
            bgGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);

            // Блики
            flares.forEach(flare => {
                flare.x += flare.speedX;
                flare.y += flare.speedY;
                if (flare.x < -100) flare.x = width + 100;
                if (flare.x > width + 100) flare.x = -100;
                if (flare.y < -100) flare.y = height + 100;
                if (flare.y > height + 100) flare.y = -100;
                drawFlare(flare);
            });

            // Линии волн
            waveLinesTop.draw(time);
            waveLinesBottom.draw(time);

            // Основные волны
            waves.forEach(wave => wave.draw(time));

            // Партиклы
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Соединяющие линии между близкими партиклами
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.08)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>'''

with open('/mnt/agents/output/neon_waves_background.html', 'w', encoding='utf-8') as f:
    f.write(html_content)
