<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVGENII</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #050505;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 0.3em;
            background: linear-gradient(135deg, #00f2ff, #40e0d0, #7fffd4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            animation: glow 3s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5)); }
            to { filter: drop-shadow(0 0 25px rgba(64, 224, 208, 0.8)); }
        }
        
        #screen1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15vh 20px 15vh;
            z-index: 100;
            background: #050505;
            transition: opacity 0.5s;
        }
        
        #screen1.hide {
            opacity: 0;
            pointer-events: none;
        }
        
        #screen2 {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            padding-top: 10vh;
            z-index: 50;
            background: #050505;
            overflow-y: auto;
        }
        
        #screen2.show {
            display: flex;
            animation: fadeIn 0.8s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn {
            padding: 18px 50px;
            background: linear-gradient(90deg, #00f2ff, #40e0d0);
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.8);
        }
        
        .content {
            max-width: 800px;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
        
        .hero-text {
            font-size: 2rem;
            color: #00f2ff;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        
        .sub-text {
            font-size: 1.2rem;
            color: #afeeee;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .title { font-size: 2.5rem; }
            .hero-text { font-size: 1.5rem; }
            .sub-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <!-- ЭКРАН 1: ВХОД -->
    <div id="screen1">
        <h1 class="title">EVGENII</h1>
        <button class="btn" onclick="enterSite()">Войти на сайт</button>
    </div>
    
    <!-- ЭКРАН 2: САЙТ -->
    <div id="screen2">
        <h1 class="title">EVGENII</h1>
        <div class="content">
            <h2 class="hero-text">Где заканчиваюсь я — и начинается ИИ.</h2>
            <p class="sub-text">Мои тексты, озвученные искусственным разумом.</p>
            <p class="sub-text">Эксперимент на стыке человеческих эмоций и машинного голоса.</p>
        </div>
    </div>

    <script>
        // Переключение экранов
        function enterSite() {
            document.getElementById('screen1').classList.add('hide');
            setTimeout(() => {
                document.getElementById('screen2').classList.add('show');
                document.body.style.overflowY = 'auto';
            }, 500);
        }
        
        // ТВОЙ ОРИГИНАЛЬНЫЙ ЭФФЕКТ ЧАСТИЦ
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const colors = ['#00f2ff', '#40e0d0', '#48d1cc', '#00ced1', '#7fffd4', '#afeeee'];
        
        // Создаем контур буквы Е
        function getEPath() {
            const points = [];
            const scale = Math.min(canvas.width, canvas.height) / 800;
            const w = 140 * scale;
            const h = 200 * scale;
            const x = canvas.width / 2 - w / 2;
            const y = canvas.height / 2 - h / 2;
            const step = 2 * scale;
            
            // Вертикальная линия
            for (let i = 0; i <= h; i += step) {
                points.push({x: x, y: y + i});
            }
            // Верхняя горизонталь
            for (let i = 0; i <= w; i += step) {
                points.push({x: x + i, y: y});
            }
            // Средняя горизонталь
            for (let i = 0; i <= w * 0.85; i += step) {
                points.push({x: x + i, y: y + h/2});
            }
            // Нижняя горизонталь
            for (let i = 0; i <= w; i += step) {
                points.push({x: x + i, y: y + h});
            }
            
            return points;
        }
        
        const pathPoints = getEPath();
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                const idx = Math.floor(Math.random() * pathPoints.length);
                const point = pathPoints[idx];
                
                this.x = point.x + (Math.random() - 0.5) * 30;
                this.y = point.y + (Math.random() - 0.5) * 30;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.5 + Math.random() * 1.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.life = 1.0;
                this.decay = 0.003 + Math.random() * 0.008;
                this.size = 1 + Math.random() * 2.5;
                this.maxSize = this.size;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.driftX = (Math.random() - 0.5) * 0.3;
                this.driftY = (Math.random() - 0.5) * 0.3;
                
                this.history = [];
                this.historyMax = 8 + Math.floor(Math.random() * 12);
            }
            
            update() {
                this.history.push({x: this.x, y: this.y, life: this.life});
                if (this.history.length > this.historyMax) {
                    this.history.shift();
                }
                
                this.x += this.vx + this.driftX + Math.sin(this.life * 10) * 0.5;
                this.y += this.vy + this.driftY + Math.cos(this.life * 8) * 0.3;
                
                this.driftX += (Math.random() - 0.5) * 0.02;
                this.driftY += (Math.random() - 0.5) * 0.02;
                
                this.life -= this.decay;
                this.size = this.maxSize * this.life;
                
                if (this.life <= 0) {
                    this.reset();
                }
            }
            
            draw() {
                // Рисуем хвост
                for (let i = 0; i < this.history.length - 1; i++) {
                    const p1 = this.history[i];
                    const p2 = this.history[i + 1];
                    const alpha = (i / this.history.length) * this.life * 0.6;
                    const width = (i / this.history.length) * this.size * 0.5;
                    
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = this.color;
                    ctx.globalAlpha = alpha;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }
                
                // Рисуем частицу
                ctx.globalAlpha = this.life * 0.9;
                ctx.shadowBlur = 15 * this.life;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life * 0.3;
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }
        
        const particles = [];
        for (let i = 0; i < 400; i++) {
            particles.push(new Particle());
        }
        
        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = 'screen';
            
            for (let p of particles) {
                p.update();
                p.draw();
            }
            
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        animate();
    </script>
</body>
</html>
