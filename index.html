    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000510; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 80px; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; display: block; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 5, 16, 0.3) 100%); z-index: 0; pointer-events: none; }

        .music-indicator {
            position: fixed; top: 2rem; right: 2rem; z-index: 20; display: flex; align-items: center; gap: 0.6rem;
            padding: 0.6rem 1rem; background: rgba(0, 200, 255, 0.05); border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 30px; backdrop-filter: blur(10px); opacity: 0; transform: translateY(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease; pointer-events: none;
        }
        .music-indicator.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .music-indicator .sound-icon { font-size: 1rem; animation: pulse 2s ease-in-out infinite; }
        .music-indicator .sound-text { font-size: 0.75rem; color: rgba(150, 220, 255, 0.7); letter-spacing: 0.1em; text-transform: uppercase; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
        .music-indicator.fade-out { opacity: 0; transform: translateY(-10px); }

        .sound-hint {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 15;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.6rem;
            padding: 1rem 2rem; background: rgba(0, 200, 255, 0.08); border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 50px; backdrop-filter: blur(15px); color: rgba(150, 220, 255, 0.9); font-size: 0.95rem;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.5s ease;
            animation: hintPulse 2.5s ease-in-out infinite; box-shadow: 0 0 30px rgba(0, 200, 255, 0.15);
            max-width: 90%; min-width: 280px; text-align: center;
        }
        .sound-hint:hover { background: rgba(0, 200, 255, 0.15); border-color: rgba(0, 200, 255, 0.6); box-shadow: 0 0 40px rgba(0, 200, 255, 0.3); transform: translateX(-50%) translateY(-3px); }
        .sound-hint .hint-icon { font-size: 1.3rem; animation: soundWave 1.5s ease-in-out infinite; flex-shrink: 0; }
        .sound-hint .hint-main-text { font-size: 0.9rem; letter-spacing: 0.12em; text-align: center; white-space: nowrap; transition: all 0.5s ease; }
        .sound-hint.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(20px); }
        .sound-hint.active {
            background: rgba(255, 180, 100, 0.08); border: 1px solid rgba(255, 180, 100, 0.4);
            box-shadow: 0 0 30px rgba(255, 180, 100, 0.15); animation: infoPulse 3s ease-in-out infinite;
            cursor: default; min-width: 320px;
        }
        .sound-hint.active:hover { background: rgba(255, 180, 100, 0.12); border-color: rgba(255, 180, 100, 0.5); box-shadow: 0 0 40px rgba(255, 180, 100, 0.25); transform: translateX(-50%) translateY(-2px); }
        .sound-hint.active .hint-icon { animation: none; font-size: 1.1rem; }
        .sound-hint.active .hint-main-text { font-size: 0.85rem; letter-spacing: 0.05em; text-transform: none; white-space: normal; line-height: 1.5; color: rgba(255, 220, 150, 0.9); }
        @keyframes hintPulse { 0%, 100% { box-shadow: 0 0 30px rgba(0, 200, 255, 0.15); border-color: rgba(0, 200, 255, 0.3); } 50% { box-shadow: 0 0 50px rgba(0, 200, 255, 0.3); border-color: rgba(0, 200, 255, 0.5); } }
        @keyframes infoPulse { 0%, 100% { box-shadow: 0 0 30px rgba(255, 180, 100, 0.15); border-color: rgba(255, 180, 100, 0.4); } 50% { box-shadow: 0 0 45px rgba(255, 180, 100, 0.25); border-color: rgba(255, 180, 100, 0.5); } }
        @keyframes soundWave { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }

        .global-player {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;

        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #00c8ff; border-radius: 50%; cursor: pointer; }

        .enter-button { display: inline-block; padding: 1.2rem 3.5rem; font-size: 1.1rem; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(150, 220, 255, 0.9); background: transparent; border: 2px solid rgba(0, 200, 255, 0.4); border-radius: 50px; cursor: pointer; transition: all 0.4s ease; text-decoration: none; position: relative; overflow: hidden; }

        .main-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 5; opacity: 0; pointer-events: none; transition: opacity 1.2s ease-in-out; color: rgba(150, 220, 255, 0.9); text-align: center; padding: 2rem; overflow-y: auto; }

        .tracks-frame { background: rgba(0, 200, 255, 0.03); border: 1px solid rgba(0, 200, 255, 0.2); border-radius: 12px; padding: 2rem; position: relative; backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(0, 200, 255, 0.05), inset 0 0 60px rgba(0, 200, 255, 0.02); width: 100%; max-width: 800px; margin: 0 auto; }
        .tracks-frame::before { content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.6), transparent); border-radius: 2px; }
        .buttons-container { display: flex; flex-direction: column; gap: 1.2rem; align-items: center; width: 100%; max-width: 600px; }
