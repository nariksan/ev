
html_content = '''<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Космический фон — Созвездия</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html { width: 100%; height: 100%; overflow: hidden; background: #050510; }
  canvas { display: block; }
  .content {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 0 20px rgba(100,150,255,0.5);
  }
  .content h1 { font-size: 3rem; font-weight: 300; letter-spacing: 0.2em; margin-bottom: 0.5rem; }
  .content p { font-size: 1.1rem; opacity: 0.8; letter-spacing: 0.05em; }
</style>
</head>
<body>
<canvas id="space"></canvas>
<div class="content">
  <h1>КОСМОС</h1>
  <p>Двигай мышью — частицы реагируют</p>
</div>

<script>
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');

let width, height;
let particles = [];
const PARTICLE_COUNT = 120;
const CONNECTION_DISTANCE = 150;
const MOUSE_DISTANCE = 200;

const mouse = { x: null, y: null, radius: MOUSE_DISTANCE };

window.addEventListener('mousemove', (e) => {
  mouse.x = e.x;
  mouse.y = e.y;
});
window.addEventListener('mouseout', () => {
  mouse.x = null;
  mouse.y = null;
});

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.6;
    this.size = Math.random() * 2 + 1;
    this.baseColor = `hsl(${Math.random() * 60 + 200}, 80%, 70%)`;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;

    if (this.x < 0 || this.x > width) this.vx *= -1;
    if (this.y < 0 || this.y > height) this.vy *= -1;

    if (mouse.x != null) {
      let dx = mouse.x - this.x;
      let dy = mouse.y - this.y;
      let distance = Math.sqrt(dx*dx + dy*dy);
      if (distance < mouse.radius) {
        const force = (mouse.radius - distance) / mouse.radius;
        const directionX = dx / distance;
        const directionY = dy / distance;
        this.vx -= directionX * force * 0.05;
        this.vy -= directionY * force * 0.05;
      }
    }
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.baseColor;
    ctx.fill();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }
}

function animate() {
  ctx.fillStyle = 'rgba(5, 5, 16, 0.2)';
  ctx.fillRect(0, 0, width, height);

  for (let i = 0; i < particles.length; i++) {
    particles[i].update();
    particles[i].draw();

    for (let j = i; j < particles.length; j++) {
      let dx = particles[i].x - particles[j].x;
      let dy = particles[i].y - particles[j].y;
      let distance = Math.sqrt(dx*dx + dy*dy);

      if (distance < CONNECTION_DISTANCE) {
        ctx.beginPath();
        let opacity = 1 - (distance / CONNECTION_DISTANCE);
        ctx.strokeStyle = `rgba(150, 200, 255, ${opacity * 0.4})`;
        ctx.lineWidth = 1;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animate);
}

init();
animate();
</script>
</body>
</html>'''

with open('/mnt/agents/output/space_constellations.html', 'w', encoding='utf-8') as f:
    f.write(html_content)

print("Файл сохранён: /mnt/agents/output/space_constellations.html")
