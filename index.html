<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVGENII — AI Experiment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            overflow: hidden; /* Чтобы не было скролла на экране входа */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            color: white;
        }

        /* Канвас для анимации - общий фон */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Общие стили для заголовка */
        .site-title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 0.3em;
            background: linear-gradient(135deg, #00f2ff, #40e0d0, #7fffd4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            text-align: center;
            margin-bottom: 20px;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.4)); }
            to { filter: drop-shadow(0 0 25px rgba(64, 224, 208, 0.8)); }
        }

        /* --- ЭКРАН 1: ВХОД --- */
        #login-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Имя сверху, кнопка снизу */
            align-items: center;
            padding: 15vh 20px 15vh; /* Отступы сверху и снизу */
            z-index: 10;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #login-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .enter-btn {
            padding: 18px 50px;
            background: linear-gradient(90deg, #00f2ff, #40e0d0);
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }

        .enter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.8);
        }

        /* --- ЭКРАН 2: САЙТ (КОНТЕНТ) --- */
        #main-site {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5; /* Ниже чем login-screen изначально, но станет активным */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10vh;
            
            /* Скрываем контент initially */
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: opacity 1s ease 0.5s, transform 1s ease 0.5s, visibility 1s;
            
            overflow-y: auto; /* Разрешаем скролл для текста */
        }

        #main-site.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            z-index: 20; /* Становится выше */
        }

        .content-block {
            max-width: 800px;
            text-align: center;
            padding: 20px;
        }

        .hero-text {
            font-size: 2rem;
            color: #00f2ff;
            margin-bottom: 30px;
            line-height: 1.4;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .sub-text {
            font-size: 1.2rem;
            color: #afeeee;
            line-height: 1.6;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        /* Адаптив под мобилки */
        @media (max-width: 768px) {
            .site-title { font-size: 2.5rem; }
            .hero-text { font-size: 1.5rem; }
            .sub-text { font-size: 1rem; }
            #login-screen { padding: 10vh 20px 10vh; }
        }
    </style>
</head>
<body>

    <!-- Фон с анимацией -->
    <canvas id="canvas"></canvas>

    <!-- ЭКРАН 1: ВХОД -->
    <div id="login-screen">
        <h1 class="site-title">EVGENII</h1>
        
        <!-- Кнопка вызывает функцию перехода -->
        <button class="enter-btn" onclick="enterSite()">Войти на сайт</button>
    </div>

    <!-- ЭКРАН 2: ОСНОВНОЙ САЙТ -->
    <div id="main-site">
        <h1 class="site-title">EVGENII</h1>
        
        <div class="content-block">
            <h2 class="hero-text">Где заканчиваюсь я — и начинается ИИ.</h2>
            
            <p class="sub-text">
                Мои тексты, озвученные искусственным разумом.
            </p>
            <p class="sub-text">
                Эксперимент на стыке человеческих эмоций и машинного голоса.
            </p>
        </div>
    </div>

    <script>
        // --- ЛОГИКА ПЕРЕХОДА ---
        function enterSite() {
            const loginScreen = document.getElementById('login-screen');
            const mainSite = document.getElementById('main-site');
            const body = document.body;

            // 1. Скрываем экран входа
            loginScreen.classList.add('hidden');

            // 2. Показываем основной сайт
            mainSite.classList.add('visible');

            // 3. Разрешаем скролл на странице (так как текста может быть много)
            body.style.overflowY = 'auto';
        }

        // --- АНИМАЦИЯ ФОНА (Neon Smoke E) ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initPath();
        }
        
        window.addEventListener('resize', resize);

        const colors = ['#00f2ff', '#40e0d0', '#48d1cc', '#00ced1', '#7fffd4', '#afeeee'];
        let pathPoints = [];

        // Генерация точек буквы Е
        function initPath() {
            pathPoints = [];
            // Масштаб зависит от размера экрана, но не слишком огромный
            const scale = Math.min(width, height) / 600; 
            const w = 140 * scale;
            const h = 200 * scale;
            // Центрируем букву
            const startX = width / 2 - w / 2;
            const startY = height / 2 - h / 2;
            const step = 3 * scale;

            // Вертикальная линия
            for (let i = 0; i <= h; i += step) pathPoints.push({x: startX, y: startY + i});
            // Верхняя горизонталь
            for (let i = 0; i <= w; i += step) pathPoints.push({x: startX + i, y: startY});
            // Средняя горизонталь
            for (let i = 0; i <= w * 0.8; i += step) pathPoints.push({x: startX + i, y: startY + h/2});
            // Нижняя горизонталь
            for (let i = 0; i <= w; i += step) pathPoints.push({x: startX + i, y: startY + h});
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                if (pathPoints.length === 0) return;
                // Выбираем случайную точку на контуре
                const point = pathPoints[Math.floor(Math.random() * pathPoints.length)];
                
                this.x = point.x + (Math.random() - 0.5) * 20;
                this.y = point.y + (Math.random() - 0.5) * 20;
                
                // Случайное направление разлета
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 1.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.life = 1.0;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = Math.random() * 2 + 0.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.history = [];
                this.maxHistory = 10;
            }

            update() {
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > this.maxHistory) this.history.shift();

                this.x += this.vx;
                this.y += this.vy;
                
                // Легкое дрожание (эффект дыма/энергии)
                this.x += (Math.random() - 0.5) * 0.5;
                this.y += (Math.random() - 0.5) * 0.5;

                this.life -= this.decay;
                if (this.life <= 0) this.reset();
            }

            draw() {
                ctx.beginPath();
                // Рисуем хвост
                if (this.history.length > 0) {
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    for (let p of this.history) ctx.lineTo(p.x, p.y);
                }
                ctx.lineTo(this.x, this.y);
                
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.globalAlpha = this.life * 0.6;
                ctx.lineCap = 'round';
                ctx.stroke();

                // Голова частицы (светящаяся точка)
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                
                ctx.globalAlpha = 1;
            }
        }

        const particles = [];
        const particleCount = 500; // Количество частиц

        function initParticles() {
            for(let i=0; i<particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Очистка с легким шлейфом
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // Режим наложения для свечения
            ctx.globalCompositeOperation = 'lighter';

            for (let p of particles) {
                p.update();
                p.draw();
            }
            
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        // Запуск
        resize();
        initParticles();
        animate();

    </script>
</body>
</html>
