<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVGENII — Эксперимент на стыке эмоций и кода</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050508;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(5, 5, 8, 0.4) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Стили для страницы входа */
        .login-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out;
            pointer-events: auto;
        }

        .login-page.fade-out {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .login-content {
            text-align: center;
            color: #e0f7fa;
            padding: 2rem;
            max-width: 900px;
        }

        .login-content h1 {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-shadow: 
                0 0 40px rgba(0, 255, 255, 0.4), 
                0 0 80px rgba(0, 200, 255, 0.2),
                0 0 120px rgba(0, 150, 255, 0.1);
            opacity: 0.95;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 
                    0 0 40px rgba(0, 255, 255, 0.4), 
                    0 0 80px rgba(0, 200, 255, 0.2),
                    0 0 120px rgba(0, 150, 255, 0.1);
            }
            to {
                text-shadow: 
                    0 0 60px rgba(0, 255, 255, 0.6), 
                    0 0 100px rgba(0, 200, 255, 0.3),
                    0 0 150px rgba(0, 150, 255, 0.2);
            }
        }

        .login-content .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            opacity: 0.85;
            line-height: 1.6;
        }

        .login-content .description {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            opacity: 0.6;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .enter-button {
            display: inline-block;
            padding: 1.2rem 3.5rem;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #e0f7fa;
            background: transparent;
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .enter-button:hover::before {
            left: 100%;
        }

        .enter-button:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: rgba(0, 255, 255, 0.8);
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.3),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .enter-button:active {
            transform: translateY(0);
        }

        /* Стили для основной страницы */
        .main-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease-in-out;
            color: #e0f7fa;
            text-align: center;
            padding: 2rem;
            overflow-y: auto;
        }

        .main-page.active {
            opacity: 1;
            pointer-events: auto;
        }

        .main-content {
            max-width: 1000px;
        }

        .main-content .site-title {
            font-size: 4rem;
            font-weight: 200;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-shadow: 
                0 0 40px rgba(0, 255, 255, 0.4), 
                0 0 80px rgba(0, 200, 255, 0.2),
                0 0 120px rgba(0, 150, 255, 0.1);
            opacity: 0.95;
            animation: glow 3s ease-in-out infinite alternate;
        }

        .main-content h1 {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            text-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            opacity: 0.9;
        }

        .main-content .description-block {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .main-content .description-block p {
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            opacity: 0.75;
            line-height: 1.7;
            max-width: 800px;
            margin: 0 auto;
        }

        .main-content .description-block p:first-child {
            font-size: 1.4rem;
            opacity: 0.85;
            font-weight: 400;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .login-content h1 {
                font-size: 3rem;
                letter-spacing: 0.2em;
            }

            .login-content .subtitle {
                font-size: 1.2rem;
            }

            .login-content .description {
                font-size: 1rem;
            }

            .enter-button {
                padding: 1rem 2.5rem;
                font-size: 1rem;
            }

            .main-content .site-title {
                font-size: 2.5rem;
                letter-spacing: 0.2em;
            }

            .main-content h1 {
                font-size: 2.2rem;
            }

            .main-content .description-block p {
                font-size: 1.1rem;
            }

            .main-content .description-block p:first-child {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .login-content h1 {
                font-size: 2.2rem;
                letter-spacing: 0.15em;
            }

            .login-content .subtitle {
                font-size: 1rem;
            }

            .login-content .description {
                font-size: 0.9rem;
            }

            .main-content .site-title {
                font-size: 1.8rem;
                letter-spacing: 0.15em;
            }

            .main-content h1 {
                font-size: 1.8rem;
            }

            .main-content .description-block p {
                font-size: 1rem;
            }

            .main-content .description-block p:first-child {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="overlay"></div>
    
    <!-- Страница входа -->
    <div class="login-page" id="loginPage">
        <div class="login-content">
            <h1>EVGENII</h1>
            <p class="subtitle">Где заканчиваюсь я — и начинается ИИ.</p>
            <p class="description">Эксперимент на стыке эмоций и кода.</p>
            <button class="enter-button" id="enterButton">Перейти на сайт</button>
        </div>
    </div>

    <!-- Основная страница -->
    <div class="main-page" id="mainPage">
        <div class="main-content">
            <h1 class="site-title">EVGENII</h1>
            <h1>Добро пожаловать</h1>
            <div class="description-block">
                <p>Где заканчиваюсь я — и начинается ИИ.</p>
                <p>Мои тексты, озвученные искусственным разумом.</p>
                <p>Эксперимент на стыке человеческих эмоций и машинного голоса.</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const loginPage = document.getElementById('loginPage');
        const mainPage = document.getElementById('mainPage');
        const enterButton = document.getElementById('enterButton');
        
        let width, height;
        let mouse = { x: 0, y: 0, active: false };
        let time = 0;
        
        // Параметры волн
        const WAVE_COUNT = 12;
        const waves = [];
        
        class Wave {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.init();
            }
            
            init() {
                this.amplitude = 80 + Math.random() * 150;
                this.frequency = 0.003 + Math.random() * 0.005;
                this.speed = 0.008 + Math.random() * 0.012;
                this.phase = Math.random() * Math.PI * 2;
                this.yOffset = Math.random() * window.innerHeight;
                
                const hue = 170 + Math.random() * 40;
                const saturation = 60 + Math.random() * 30;
                const lightness = 40 + Math.random() * 30;
                this.baseColor = `hsla(${hue}, ${saturation}%, ${lightness}%`;
                this.alpha = 0.15 + Math.random() * 0.4;
                
                this.lineWidth = 1 + Math.random() * 3;
                
                this.points = [];
                this.numPoints = 5 + Math.floor(Math.random() * 4);
            }
            
            update(t) {
                this.points = [];
                const segmentWidth = width / (this.numPoints - 1);
                
                for (let i = 0; i < this.numPoints; i++) {
                    const x = i * segmentWidth;
                    
                    let y = this.yOffset + 
                            Math.sin(x * this.frequency + t * this.speed + this.phase) * this.amplitude +
                            Math.sin(x * this.frequency * 0.5 + t * this.speed * 1.3) * this.amplitude * 0.5;
                    
                    if (mouse.active) {
                        const dx = x - mouse.x;
                        const dy = y - mouse.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const maxDist = 300;
                        
                        if (dist < maxDist) {
                            const force = (1 - dist / maxDist) * 80;
                            y += (dy / dist) * force * (this.index % 2 === 0 ? 1 : -1);
                        }
                    }
                    
                    this.points.push({ x, y });
                }
            }
            
            draw(ctx) {
                if (this.points.length < 2) return;
                
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                for (let i = 0; i < this.points.length - 1; i++) {
                    const p0 = this.points[i];
                    const p1 = this.points[i + 1];
                    
                    const midX = (p0.x + p1.x) / 2;
                    const midY = (p0.y + p1.y) / 2;
                    
                    if (i === 0) {
                        ctx.lineTo(midX, midY);
                    } else {
                        ctx.quadraticCurveTo(p0.x, p0.y, midX, midY);
                    }
                }
                
                const last = this.points[this.points.length - 1];
                ctx.lineTo(last.x, last.y);
                
                ctx.shadowColor = this.baseColor.replace('hsla', 'hsl').replace(/,[\d.]+%\)/, ')');
                ctx.shadowBlur = 20 + this.index * 2;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                
                ctx.strokeStyle = `${this.baseColor}, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                
                if (this.alpha > 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(this.points[0].x, this.points[0].y);
                    
                    for (let i = 0; i < this.points.length - 1; i++) {
                        const p0 = this.points[i];
                        const p1 = this.points[i + 1];
                        const midX = (p0.x + p1.x) / 2;
                        const midY = (p0.y + p1.y) / 2;
                        
                        if (i === 0) {
                            ctx.lineTo(midX, midY);
                        } else {
                            ctx.quadraticCurveTo(p0.x, p0.y, midX, midY);
                        }
                    }
                    ctx.lineTo(last.x, last.y);
                    
                    ctx.strokeStyle = `${this.baseColor}, ${this.alpha * 0.6})`;
                    ctx.lineWidth = this.lineWidth * 0.4;
                    ctx.stroke();
                }
            }
        }
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = -Math.random() * 0.5 - 0.1;
                this.size = Math.random() * 2 + 0.5;
                this.alpha = Math.random() * 0.3 + 0.1;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                const hue = 170 + Math.random() * 40;
                this.color = `hsla(${hue}, 70%, 60%`;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                
                if (this.life <= 0 || this.y < -10 || this.x < -10 || this.x > width + 10) {
                    this.reset();
                }
            }
            
            draw(ctx) {
                const lifeRatio = this.life / this.maxLife;
                const alpha = this.alpha * lifeRatio * lifeRatio;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `${this.color}, ${alpha})`;
                ctx.shadowColor = this.color.replace('hsla', 'hsl').replace(/,[\d.]+%\)/, ')');
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        const particles = [];
        const PARTICLE_COUNT = 60;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            waves.length = 0;
            for (let i = 0; i < WAVE_COUNT; i++) {
                waves.push(new Wave(i, WAVE_COUNT));
            }
            
            particles.length = 0;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }
        
        function animate() {
            time += 1;
            
            ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            for (const p of particles) {
                p.update();
                p.draw(ctx);
            }
            
            for (const wave of waves) {
                wave.update(time);
                wave.draw(ctx);
            }
            
            drawFlares(ctx);
            
            requestAnimationFrame(animate);
        }
        
        function drawFlares(ctx) {
            const flarePositions = [
                { x: width * 0.3, y: height * 0.4, size: 3, alpha: 0.6 },
                { x: width * 0.7, y: height * 0.6, size: 2, alpha: 0.4 },
                { x: width * 0.5, y: height * 0.3, size: 4, alpha: 0.3 },
            ];
            
            for (const flare of flarePositions) {
                const fx = flare.x + Math.sin(time * 0.01) * 50;
                const fy = flare.y + Math.cos(time * 0.013) * 30;
                
                const gradient = ctx.createRadialGradient(fx, fy, 0, fx, fy, flare.size * 8);
                gradient.addColorStop(0, `rgba(200, 255, 255, ${flare.alpha})`);
                gradient.addColorStop(0.5, `rgba(0, 255, 255, ${flare.alpha * 0.3})`);
                gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
                
                ctx.beginPath();
                ctx.arc(fx, fy, flare.size * 8, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(fx, fy, flare.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${flare.alpha})`;
                ctx.shadowColor = 'rgba(0, 255, 255, 0.8)';
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // Переход между страницами
        enterButton.addEventListener('click', () => {
            loginPage.classList.add('fade-out');
            
            setTimeout(() => {
                mainPage.classList.add('active');
            }, 600);
        });
        
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });
        
        window.addEventListener('mouseleave', () => {
            mouse.active = false;
        });
        
        window.addEventListener('resize', resize);
        
        resize();
        animate();
    </script>
</body>
</html>
