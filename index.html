html_content = '''<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Particles Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000510;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            width: 90%;
            max-width: 1200px;
        }
        .title {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow:
                0 0 10px rgba(0, 200, 255, 0.8),
                0 0 30px rgba(0, 200, 255, 0.6),
                0 0 60px rgba(0, 200, 255, 0.4),
                0 0 100px rgba(0, 200, 255, 0.2);
            position: relative;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
            line-height: 1.1;
        }
        .title::after {
            content: attr(data-text);
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            transform: scaleY(-1);
            opacity: 0.25;
            filter: blur(2px);
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Неоновая рамка для подзаголовка */
        .subtitle-frame {
            display: inline-block;
            margin-top: 2rem;
            padding: 20px 40px;
            border: 1px solid rgba(0, 200, 255, 0.4);
            border-radius: 12px;
            background: rgba(0, 20, 40, 0.3);
            backdrop-filter: blur(8px);
            box-shadow:
                0 0 15px rgba(0, 200, 255, 0.3),
                0 0 30px rgba(0, 200, 255, 0.15),
                0 0 60px rgba(0, 200, 255, 0.08),
                inset 0 0 15px rgba(0, 200, 255, 0.1),
                inset 0 0 30px rgba(0, 200, 255, 0.05);
            position: relative;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
            animation: framePulse 4s ease-in-out infinite;
        }
        
        .subtitle-frame::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 12px;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(0, 200, 255, 0.1) 50%,
                transparent 70%
            );
            pointer-events: none;
            opacity: 0;
            animation: frameShine 6s ease-in-out infinite;
        }
        
        @keyframes framePulse {
            0%, 100% {
                box-shadow:
                    0 0 15px rgba(0, 200, 255, 0.3),
                    0 0 30px rgba(0, 200, 255, 0.15),
                    0 0 60px rgba(0, 200, 255, 0.08),
                    inset 0 0 15px rgba(0, 200, 255, 0.1),
                    inset 0 0 30px rgba(0, 200, 255, 0.05);
            }
            50% {
                box-shadow:
                    0 0 20px rgba(0, 200, 255, 0.4),
                    0 0 40px rgba(0, 200, 255, 0.2),
                    0 0 80px rgba(0, 200, 255, 0.1),
                    inset 0 0 20px rgba(0, 200, 255, 0.15),
                    inset 0 0 40px rgba(0, 200, 255, 0.08);
            }
        }
        
        @keyframes frameShine {
            0%, 100% {
                opacity: 0;
                transform: translateX(-100%);
            }
            50% {
                opacity: 1;
                transform: translateX(100%);
            }
        }
        
        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: rgba(150, 220, 255, 0.9);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
        }
        
        /* Кнопка */
        .listen-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 40px;
            background: transparent;
            border: 2px solid rgba(0, 200, 255, 0.6);
            color: rgba(0, 200, 255, 0.9);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            pointer-events: all;
            z-index: 20;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border-radius: 50px;
            box-shadow: 
                0 0 20px rgba(0, 200, 255, 0.3),
                inset 0 0 20px rgba(0, 200, 255, 0.1);
        }
        .listen-btn:hover {
            background: rgba(0, 200, 255, 0.15);
            border-color: rgba(0, 200, 255, 0.9);
            box-shadow: 
                0 0 30px rgba(0, 200, 255, 0.5),
                inset 0 0 30px rgba(0, 200, 255, 0.2);
            transform: translateX(-50%) translateY(-3px);
        }
        .listen-btn:active {
            transform: translateX(-50%) translateY(0);
        }
        
        /* Состояния для анимации перехода */
        .fade-out {
            opacity: 0;
            transform: translateY(-30px);
        }
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
        }
        .visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Скрываем кнопку после нажатия */
        .btn-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) scale(0.8);
        }
        
        /* Стили для двухстрочного заголовка */
        .title-line {
            display: block;
        }
        .title-line-small {
            font-size: 0.5em;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="content">
        <div class="title visible" data-text="EVGENII" id="mainTitle">EVGENII</div>
        <div class="subtitle-frame visible" id="subtitleFrame">
            <div class="subtitle" id="mainSubtitle">Где заканчиваюсь я — и начинается ИИ.<br>Эксперимент на стыке эмоций и кода.</div>
        </div>
    </div>
    
    <button class="listen-btn" id="listenBtn">Слушать синтез</button>

    <script>
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        const mainTitle = document.getElementById('mainTitle');
        const subtitleFrame = document.getElementById('subtitleFrame');
        const mainSubtitle = document.getElementById('mainSubtitle');
        const listenBtn = document.getElementById('listenBtn');

        let width, height;
        let time = 0;
        let isTransitioned = false;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // === ПАРТИКЛЫ ===
        const particles = [];
        const particleCount = 180;

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.8 + 0.2;
                this.life = Math.random() * 300 + 100;
                this.maxLife = this.life;
                const colors = [
                    '0, 200, 255',
                    '0, 255, 200',
                    '100, 200, 255',
                    '0, 220, 240'
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                if (this.life <= 0 || this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) {
                    this.reset();
                }
            }
            draw() {
                const alpha = (this.life / this.maxLife) * this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${alpha})`;
                ctx.shadowBlur = 12;
                ctx.shadowColor = `rgba(${this.color}, ${alpha * 0.6})`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // === БЛИКИ / ЛИНЗЫ ===
        const flares = [];
        for (let i = 0; i < 8; i++) {
            flares.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 100 + 50,
                speedX: (Math.random() - 0.5) * 0.2,
                speedY: (Math.random() - 0.5) * 0.2,
                opacity: Math.random() * 0.12 + 0.03,
                hue: 160 + Math.random() * 40,
                pulse: Math.random() * Math.PI * 2
            });
        }

        function drawFlare(flare, t) {
            const pulse = Math.sin(t * 0.5 + flare.pulse) * 0.5 + 0.5;
            const gradient = ctx.createRadialGradient(
                flare.x, flare.y, 0,
                flare.x, flare.y, flare.size
            );
            gradient.addColorStop(0, `hsla(${flare.hue}, 100%, 70%, ${flare.opacity * pulse})`);
            gradient.addColorStop(0.4, `hsla(${flare.hue}, 100%, 50%, ${flare.opacity * pulse * 0.4})`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(flare.x, flare.y, flare.size, 0, Math.PI * 2);
            ctx.fill();
        }

        // === ЛЁГКИЕ СВЕТОВЫЕ ПОЛОСЫ (атмосфера) ===
        const lightStreaks = [];
        for (let i = 0; i < 5; i++) {
            lightStreaks.push({
                x: Math.random() * width,
                y: Math.random() * height,
                width: Math.random() * 200 + 100,
                height: Math.random() * 2 + 0.5,
                angle: Math.random() * Math.PI * 2,
                speed: (Math.random() - 0.5) * 0.3,
                opacity: Math.random() * 0.08 + 0.02,
                hue: 170 + Math.random() * 30
            });
        }

        function drawLightStreak(streak, t) {
            ctx.save();
            ctx.translate(streak.x, streak.y);
            ctx.rotate(streak.angle + t * 0.1);
            const gradient = ctx.createLinearGradient(-streak.width / 2, 0, streak.width / 2, 0);
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(0.5, `hsla(${streak.hue}, 100%, 70%, ${streak.opacity})`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(-streak.width / 2, -streak.height / 2, streak.width, streak.height);
            ctx.restore();
        }

        // === ГЛАВНЫЙ ЦИКЛ ===
        function animate() {
            time += 0.016;

            // Очистка с trail-эффектом
            ctx.fillStyle = 'rgba(0, 5, 16, 0.12)';
            ctx.fillRect(0, 0, width, height);

            // Фоновый градиент
            const bgGradient = ctx.createRadialGradient(
                width * 0.5, height * 0.5, 0,
                width * 0.5, height * 0.5, width * 0.8
            );
            bgGradient.addColorStop(0, 'rgba(0, 30, 60, 0.25)');
            bgGradient.addColorStop(0.5, 'rgba(0, 10, 30, 0.08)');
            bgGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);

            // Блики
            flares.forEach(flare => {
                flare.x += flare.speedX;
                flare.y += flare.speedY;
                if (flare.x < -150) flare.x = width + 150;
                if (flare.x > width + 150) flare.x = -150;
                if (flare.y < -150) flare.y = height + 150;
                if (flare.y > height + 150) flare.y = -150;
                drawFlare(flare, time);
            });

            // Световые полосы
            lightStreaks.forEach(streak => {
                streak.x += streak.speed;
                streak.y += streak.speed * 0.3;
                if (streak.x < -200) streak.x = width + 200;
                if (streak.x > width + 200) streak.x = -200;
                if (streak.y < -200) streak.y = height + 200;
                if (streak.y > height + 200) streak.y = -200;
                drawLightStreak(streak, time);
            });

            // Соединяющие линии между близкими партиклами
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const alpha = (1 - dist / 150) * 0.1;
                        ctx.strokeStyle = `rgba(0, 200, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            // Партиклы
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
        
        // === ОБРАБОТЧИК КНОПКИ ===
        listenBtn.addEventListener('click', function() {
            if (isTransitioned) return;
            isTransitioned = true;
            
            // Скрываем кнопку
            listenBtn.classList.add('btn-hidden');
            
            // Анимация исчезновения старого текста
            mainTitle.classList.remove('visible');
            mainTitle.classList.add('fade-out');
            subtitleFrame.classList.remove('visible');
            subtitleFrame.classList.add('fade-out');
            
            // Ждем окончания анимации исчезновения
            setTimeout(() => {
                // Меняем текст на двухстрочный формат
                mainTitle.setAttribute('data-text', 'ДОБРО ПОЖАЛОВАТЬ');
                mainTitle.innerHTML = '<span class="title-line">ДОБРО</span><span class="title-line title-line-small">ПОЖАЛОВАТЬ</span>';
                mainSubtitle.innerHTML = 'Мои тексты, озвученные искусственным разумом.<br>Эксперимент на стыке человеческих эмоций и машинного голоса.';
                
                // Анимация появления нового текста
                mainTitle.classList.remove('fade-out');
                mainTitle.classList.add('fade-in');
                subtitleFrame.classList.remove('fade-out');
                subtitleFrame.classList.add('fade-in');
                
                // Небольшая задержка перед появлением
                setTimeout(() => {
                    mainTitle.classList.remove('fade-in');
                    mainTitle.classList.add('visible');
                    subtitleFrame.classList.remove('fade-in');
                    subtitleFrame.classList.add('visible');
                }, 100);
            }, 800);
        });
    </script>
</body>
</html>'''

with open('/mnt/agents/output/neon_particles_background.html', 'w', encoding='utf-8') as f:
    f.write(html_content)
