<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVGENII — Эксперимент на стыке эмоций и кода</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050508;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(5, 5, 8, 0.4) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Стили для страницы входа */
        .login-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out;
            pointer-events: auto;
        }

        .login-page.fade-out {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .login-content {
            text-align: center;
            color: #e0f7fa;
            padding: 2rem;
            max-width: 900px;
        }

        /* Металлический текст с переливом для страницы входа */
        .login-content h1 {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            background: linear-gradient(
                90deg,
                #4a9eff 0%,
                #88d4ff 15%,
                #ffffff 30%,
                #88d4ff 45%,
                #4a9eff 60%,
                #00ffff 75%,
                #ffffff 90%,
                #88d4ff 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: metalShine 8s ease-in-out infinite, glow 3s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.4)) drop-shadow(0 0 40px rgba(0, 200, 255, 0.2));
        }

        @keyframes metalShine {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.4)) drop-shadow(0 0 40px rgba(0, 200, 255, 0.2));
            }
            to {
                filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.6)) drop-shadow(0 0 60px rgba(0, 200, 255, 0.3));
            }
        }

        .login-content .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            opacity: 0.85;
            line-height: 1.6;
        }

        .login-content .description {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            opacity: 0.6;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .enter-button {
            display: inline-block;
            padding: 1.2rem 3.5rem;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #e0f7fa;
            background: transparent;
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .enter-button:hover::before {
            left: 100%;
        }

        .enter-button:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: rgba(0, 255, 255, 0.8);
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.3),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .enter-button:active {
            transform: translateY(0);
        }

        /* Стили для основной страницы */
        .main-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease-in-out;
            color: #e0f7fa;
            text-align: center;
            padding: 2rem;
        }

        .main-page.active {
            opacity: 1;
            pointer-events: auto;
        }

        .main-content {
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Металлический текст с переливом для основной страницы */
        .main-content .site-title {
            font-size: 4rem;
            font-weight: 200;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            background: linear-gradient(
                90deg,
                #4a9eff 0%,
                #88d4ff 15%,
                #ffffff 30%,
                #88d4ff 45%,
                #4a9eff 60%,
                #00ffff 75%,
                #ffffff 90%,
                #88d4ff 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: metalShine 8s ease-in-out infinite, glow 3s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.4)) drop-shadow(0 0 40px rgba(0, 200, 255, 0.2));
        }

        .main-content h1 {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            text-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            opacity: 0.9;
        }

        .main-content .description-block {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 3rem;
        }

        .main-content .description-block p {
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            opacity: 0.75;
            line-height: 1.7;
            max-width: 800px;
            margin: 0 auto;
        }

        .main-content .description-block p:first-child {
            font-size: 1.4rem;
            opacity: 0.85;
            font-weight: 400;
        }

        /* Контейнер для кнопок */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
        }

        .buttons-row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Кнопки */
        .updates-button,
        .about-button,
        .chat-button {
            display: inline-block;
            padding: 1rem 3rem;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #e0f7fa;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            min-width: 220px;
        }

        .updates-button:hover,
        .about-button:hover,
        .chat-button:hover {
            background: rgba(0, 255, 255, 0.15);
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Иконка для кнопки чата */
        .chat-button::after {
            content: '💬';
            margin-left: 0.5rem;
            font-size: 1.1rem;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(15, 15, 25, 0.95) 0%, rgba(10, 20, 30, 0.95) 100%);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 750px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.5s ease;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6), inset 0 0 100px rgba(0, 255, 255, 0.02);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.15);
        }

        .modal-header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 200, 255, 0.1));
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .modal-header h2 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .close-modal {
            margin-left: auto;
            background: transparent;
            border: none;
            color: rgba(224, 247, 250, 0.5);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-modal:hover {
            color: #e0f7fa;
            background: rgba(0, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        /* Стили для списка обновлений */
        .updates-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .update-item {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .update-item:last-child {
            border-bottom: none;
        }

        .update-item:hover {
            background: rgba(0, 255, 255, 0.03);
            margin: 0 -1rem;
            padding-left: 1rem;
            padding-right: 1rem;
            border-radius: 10px;
        }

        .update-date {
            min-width: 90px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffd700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .update-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .update-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .update-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: 1.5px solid;
        }

        .badge-new {
            background: rgba(255, 100, 100, 0.15);
            border-color: #ff6464;
            color: #ff8a8a;
        }

        .badge-sys {
            background: rgba(0, 255, 255, 0.15);
            border-color: #00ffff;
            color: #8affff;
        }

        .update-title {
            font-size: 1.15rem;
            font-weight: 500;
            color: #ffffff;
            line-height: 1.4;
        }

        .update-title strong {
            font-weight: 600;
            color: #ffffff;
        }

        .update-text {
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.6;
            color: #b0e0e6;
            opacity: 0.9;
        }

        /* Стили для текста "О проекте" */
        .about-text {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.8;
            color: #b0e0e6;
            opacity: 0.95;
        }

        .about-text p {
            margin-bottom: 1.5rem;
        }

        .about-text p:last-child {
            margin-bottom: 0;
        }

        .about-text .highlight {
            color: #00ffff;
            font-weight: 500;
        }

        .about-text .quote {
            border-left: 3px solid rgba(0, 255, 255, 0.5);
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: #e0f7fa;
            opacity: 0.85;
        }

        /* Стили для сообщения чата */
        .chat-message {
            text-align: center;
            padding: 3rem 2rem;
        }

        .chat-message .chat-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }

        .chat-message h3 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }

        .chat-message p {
            font-size: 1.1rem;
            font-weight: 300;
            color: #b0e0e6;
            opacity: 0.8;
            line-height: 1.6;
        }

        .chat-message .coming-soon {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.5rem 1.5rem;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 0.9rem;
            color: #00ffff;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Скроллбар для модального окна */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 4px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 255, 0.5);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .login-content h1 {
                font-size: 3rem;
                letter-spacing: 0.2em;
            }

            .login-content .subtitle {
                font-size: 1.2rem;
            }

            .login-content .description {
                font-size: 1rem;
            }

            .enter-button {
                padding: 1rem 2.5rem;
                font-size: 1rem;
            }

            .main-content .site-title {
                font-size: 2.5rem;
                letter-spacing: 0.2em;
            }

            .main-content h1 {
                font-size: 2.2rem;
            }

            .main-content .description-block p {
                font-size: 1.1rem;
            }

            .main-content .description-block p:first-child {
                font-size: 1.2rem;
            }

            .buttons-row {
                gap: 1rem;
                width: 100%;
                justify-content: center;
            }

            .updates-button,
            .about-button,
            .chat-button {
                flex: 1;
                min-width: 150px;
                max-width: 280px;
                padding: 0.9rem 2rem;
                font-size: 0.95rem;
            }

            .modal-content {
                padding: 2rem 1.5rem;
            }

            .modal-header h2 {
                font-size: 1.4rem;
            }

            .update-item {
                flex-direction: column;
                gap: 1rem;
            }

            .update-date {
                min-width: auto;
            }

            .update-title {
                font-size: 1.05rem;
            }

            .about-text {
                font-size: 1rem;
            }

            .chat-message .chat-icon {
                font-size: 3rem;
            }

            .chat-message h3 {
                font-size: 1.3rem;
            }

            .chat-message p {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .login-content h1 {
                font-size: 2.2rem;
                letter-spacing: 0.15em;
            }

            .login-content .subtitle {
                font-size: 1rem;
            }

            .login-content .description {
                font-size: 0.9rem;
            }

            .main-content .site-title {
                font-size: 1.8rem;
                letter-spacing: 0.15em;
            }

            .main-content h1 {
                font-size: 1.8rem;
            }

            .main-content .description-block p {
                font-size: 1rem;
            }

            .main-content .description-block p:first-child {
                font-size: 1.1rem;
            }

            .updates-button,
            .about-button,
            .chat-button {
                padding: 0.8rem 1.5rem;
                font-size: 0.85rem;
                min-width: 140px;
            }

            .modal-content {
                padding: 1.5rem 1rem;
            }

            .modal-header h2 {
                font-size: 1.2rem;
            }

            .update-title {
                font-size: 1rem;
            }

            .update-text {
                font-size: 0.95rem;
            }

            .about-text {
                font-size: 0.95rem;
            }

            .chat-message {
                padding: 2rem 1rem;
            }

            .chat-message .chat-icon {
                font-size: 2.5rem;
            }

            .chat-message h3 {
                font-size: 1.1rem;
            }

            .chat-message p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="overlay"></div>
    
    <!-- Страница входа -->
    <div class="login-page" id="loginPage">
        <div class="login-content">
            <h1>EVGENII</h1>
            <p class="subtitle">Где заканчиваюсь я — и начинается ИИ.</p>
            <p class="description">Эксперимент на стыке эмоций и кода.</p>
            <button class="enter-button" id="enterButton">Перейти на сайт</button>
        </div>
    </div>

    <!-- Основная страница -->
    <div class="main-page" id="mainPage">
        <div class="main-content">
            <h1 class="site-title">EVGENII</h1>
            <h1>Добро пожаловать</h1>
            <div class="description-block">
                <p>Где заканчиваюсь я — и начинается ИИ.</p>
                <p>Мои тексты, озвученные искусственным разумом.</p>
                <p>Эксперимент на стыке человеческих эмоций и машинного голоса.</p>
            </div>
            <div class="buttons-container">
                <button class="updates-button" id="updatesButton">Лента обновлений</button>
                <div class="buttons-row">
                    <button class="about-button" id="aboutButton">О проекте</button>
                    <button class="chat-button" id="chatButton">Чат</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-icon" id="modalIcon">●</div>
                <h2 id="modalTitle">Последние обновления</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div id="modalBody">
                <!-- Контент загружается динамически -->
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const loginPage = document.getElementById('loginPage');
        const mainPage = document.getElementById('mainPage');
        const enterButton = document.getElementById('enterButton');
        const updatesButton = document.getElementById('updatesButton');
        const aboutButton = document.getElementById('aboutButton');
        const chatButton = document.getElementById('chatButton');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeModal = document.getElementById('closeModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalIcon = document.getElementById('modalIcon');
        const modalBody = document.getElementById('modalBody');
        
        let width, height;
        let mouse = { x: 0, y: 0, active: false };
        let time = 0;
        
        // Параметры волн
        const WAVE_COUNT = 12;
        const waves = [];
        
        class Wave {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.init();
            }
            
            init() {
                this.amplitude = 80 + Math.random() * 150;
                this.frequency = 0.003 + Math.random() * 0.005;
                this.speed = 0.008 + Math.random() * 0.012;
                this.phase = Math.random() * Math.PI * 2;
                this.yOffset = Math.random() * window.innerHeight;
                
                const hue = 170 + Math.random() * 40;
                const saturation = 60 + Math.random() * 30;
                const lightness = 40 + Math.random() * 30;
                this.baseColor = `hsla(${hue}, ${saturation}%, ${lightness}%`;
                this.alpha = 0.15 + Math.random() * 0.4;
                
                this.lineWidth = 1 + Math.random() * 3;
                
                this.points = [];
                this.numPoints = 5 + Math.floor(Math.random() * 4);
            }
            
            update(t) {
                this.points = [];
                const segmentWidth = width / (this.numPoints - 1);
                
                for (let i = 0; i < this.numPoints; i++) {
                    const x = i * segmentWidth;
                    
                    let y = this.yOffset + 
                            Math.sin(x * this.frequency + t * this.speed + this.phase) * this.amplitude +
                            Math.sin(x * this.frequency * 0.5 + t * this.speed * 1.3) * this.amplitude * 0.5;
                    
                    if (mouse.active) {
                        const dx = x - mouse.x;
                        const dy = y - mouse.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const maxDist = 300;
                        
                        if (dist < maxDist) {
                            const force = (1 - dist / maxDist) * 80;
                            y += (dy / dist) * force * (this.index % 2 === 0 ? 1 : -1);
                        }
                    }
                    
                    this.points.push({ x, y });
                }
            }
            
            draw(ctx) {
                if (this.points.length < 2) return;
                
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                for (let i = 0; i < this.points.length - 1; i++) {
                    const p0 = this.points[i];
                    const p1 = this.points[i + 1];
                    
                    const midX = (p0.x + p1.x) / 2;
                    const midY = (p0.y + p1.y) / 2;
                    
                    if (i === 0) {
                        ctx.lineTo(midX, midY);
                    } else {
                        ctx.quadraticCurveTo(p0.x, p0.y, midX, midY);
                    }
                }
                
                const last = this.points[this.points.length - 1];
                ctx.lineTo(last.x, last.y);
                
                ctx.shadowColor = this.baseColor.replace('hsla', 'hsl').replace(/,[\d.]+%\)/, ')');
                ctx.shadowBlur = 20 + this.index * 2;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                
                ctx.strokeStyle = `${this.baseColor}, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                
                if (this.alpha > 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(this.points[0].x, this.points[0].y);
                    
                    for (let i = 0; i < this.points.length - 1; i++) {
                        const p0 = this.points[i];
                        const p1 = this.points[i + 1];
                        const midX = (p0.x + p1.x) / 2;
                        const midY = (p0.y + p1.y) / 2;
                        
                        if (i === 0) {
                            ctx.lineTo(midX, midY);
                        } else {
                            ctx.quadraticCurveTo(p0.x, p0.y, midX, midY);
                        }
                    }
                    ctx.lineTo(last.x, last.y);
                    
                    ctx.strokeStyle = `${this.baseColor}, ${this.alpha * 0.6})`;
                    ctx.lineWidth = this.lineWidth * 0.4;
                    ctx.stroke();
                }
            }
        }
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = -Math.random() * 0.5 - 0.1;
                this.size = Math.random() * 2 + 0.5;
                this.alpha = Math.random() * 0.3 + 0.1;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                const hue = 170 + Math.random() * 40;
                this.color = `hsla(${hue}, 70%, 60%`;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                
                if (this.life <= 0 || this.y < -10 || this.x < -10 || this.x > width + 10) {
                    this.reset();
                }
            }
            
            draw(ctx) {
                const lifeRatio = this.life / this.maxLife;
                const alpha = this.alpha * lifeRatio * lifeRatio;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `${this.color}, ${alpha})`;
                ctx.shadowColor = this.color.replace('hsla', 'hsl').replace(/,[\d.]+%\)/, ')');
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        const particles = [];
        const PARTICLE_COUNT = 60;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            waves.length = 0;
            for (let i = 0; i < WAVE_COUNT; i++) {
                waves.push(new Wave(i, WAVE_COUNT));
            }
            
            particles.length = 0;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }
        
        function animate() {
            time += 1;
            
            ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            for (const p of particles) {
                p.update();
                p.draw(ctx);
            }
            
            for (const wave of waves) {
                wave.update(time);
                wave.draw(ctx);
            }
            
            drawFlares(ctx);
            
            requestAnimationFrame(animate);
        }
        
        function drawFlares(ctx) {
            const flarePositions = [
                { x: width * 0.3, y: height * 0.4, size: 3, alpha: 0.6 },
                { x: width * 0.7, y: height * 0.6, size: 2, alpha: 0.4 },
                { x: width * 0.5, y: height * 0.3, size: 4, alpha: 0.3 },
            ];
            
            for (const flare of flarePositions) {
                const fx = flare.x + Math.sin(time * 0.01) * 50;
                const fy = flare.y + Math.cos(time * 0.013) * 30;
                
                const gradient = ctx.createRadialGradient(fx, fy, 0, fx, fy, flare.size * 8);
                gradient.addColorStop(0, `rgba(200, 255, 255, ${flare.alpha})`);
                gradient.addColorStop(0.5, `rgba(0, 255, 255, ${flare.alpha * 0.3})`);
                gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
                
                ctx.beginPath();
                ctx.arc(fx, fy, flare.size * 8, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(fx, fy, flare.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${flare.alpha})`;
                ctx.shadowColor = 'rgba(0, 255, 255, 0.8)';
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // Переход между страницами
        enterButton.addEventListener('click', () => {
            loginPage.classList.add('fade-out');
            
            setTimeout(() => {
                mainPage.classList.add('active');

                        </div>
                    </div>

                                <span class="update-badge badge-sys">SYS</span>

                            </div>
                            <div class="update-text">Улучшено эмоциональное окрашивание речи ИИ. Теперь интонации лучше передают меланхолию и созерцание.</div>
                        </div>
                    </div>
                </div>
            `;
            modalOverlay.classList.add('active');
        });

        // Управление модальным окном "О проекте"
        aboutButton.addEventListener('click', () => {

                    <div class="quote">
                        «Я придумываю текст и стиль исполнения. А выучить и воплотить в песню доверяю ИИ.»
                    </div>
                    
                    <p>

                    <p>

                    </p>
                    
                    <p>
                        Этот проект — исследование границ между автором и исполнителем, между живым чувством и алгоритмом, между тем, кто пишет, и тем, кто поёт.
                    </p>
                </div>
            `;
            modalOverlay.classList.add('active');

        // Управление модальным окном чата
        chatButton.addEventListener('click', () => {

            modalBody.innerHTML = `
                <div class="chat-message">

                    <p>Мы работаем над улучшением функции общения. Скоро чат станет доступен!</p>
                    <div class="coming-soon">Скоро будет</div>

        // Закрытие модального окна
        closeModal.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        // Закрытие по клику вне окна
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });
        
        window.addEventListener('mouseleave', () => {
            mouse.active = false;
        });
        
        window.addEventListener('resize', resize);
        
        resize();
        animate();
    </script>
