    <script>
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // === ПАРТИКЛЫ ===
        const particles = [];
        const particleCount = 180;

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.8 + 0.2;
                this.life = Math.random() * 300 + 100;
                this.maxLife = this.life;
                const colors = [
                    '0, 200, 255',
                    '0, 255, 200',
                    '100, 200, 255',
                    '0, 220, 240'
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                if (this.life <= 0 || this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) {
                    this.reset();
                }
            }
            draw() {
                const alpha = (this.life / this.maxLife) * this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${alpha})`;
                ctx.shadowBlur = 12;
                ctx.shadowColor = `rgba(${this.color}, ${alpha * 0.6})`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // === БЛИКИ / ЛИНЗЫ ===
        const flares = [];
        for (let i = 0; i < 8; i++) {
            flares.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 100 + 50,
                speedX: (Math.random() - 0.5) * 0.2,
                speedY: (Math.random() - 0.5) * 0.2,
                opacity: Math.random() * 0.12 + 0.03,
                hue: 160 + Math.random() * 40,
                pulse: Math.random() * Math.PI * 2
            });
        }

        function drawFlare(flare, t) {
            const pulse = Math.sin(t * 0.5 + flare.pulse) * 0.5 + 0.5;
            const gradient = ctx.createRadialGradient(
                flare.x, flare.y, 0,
                flare.x, flare.y, flare.size
            );
            gradient.addColorStop(0, `hsla(${flare.hue}, 100%, 70%, ${flare.opacity * pulse})`);
            gradient.addColorStop(0.4, `hsla(${flare.hue}, 100%, 50%, ${flare.opacity * pulse * 0.4})`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(flare.x, flare.y, flare.size, 0, Math.PI * 2);
            ctx.fill();
        }

        // === ЛЁГКИЕ СВЕТОВЫЕ ПОЛОСЫ (атмосфера) ===
        const lightStreaks = [];
        for (let i = 0; i < 5; i++) {
            lightStreaks.push({
                x: Math.random() * width,
                y: Math.random() * height,
                width: Math.random() * 200 + 100,
                height: Math.random() * 2 + 0.5,
                angle: Math.random() * Math.PI * 2,
                speed: (Math.random() - 0.5) * 0.3,
                opacity: Math.random() * 0.08 + 0.02,
                hue: 170 + Math.random() * 30
            });
        }

        function drawLightStreak(streak, t) {
            ctx.save();
            ctx.translate(streak.x, streak.y);
            ctx.rotate(streak.angle + t * 0.1);
            const gradient = ctx.createLinearGradient(-streak.width / 2, 0, streak.width / 2, 0);
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(0.5, `hsla(${streak.hue}, 100%, 70%, ${streak.opacity})`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(-streak.width / 2, -streak.height / 2, streak.width, streak.height);
            ctx.restore();
        }

        // === ГЛАВНЫЙ ЦИКЛ ===
        function animate() {
            time += 0.016;

            // Очистка с trail-эффектом
            ctx.fillStyle = 'rgba(0, 5, 16, 0.12)';
            ctx.fillRect(0, 0, width, height);

            // Фоновый градиент
            const bgGradient = ctx.createRadialGradient(
                width * 0.5, height * 0.5, 0,
                width * 0.5, height * 0.5, width * 0.8
            );
            bgGradient.addColorStop(0, 'rgba(0, 30, 60, 0.25)');
            bgGradient.addColorStop(0.5, 'rgba(0, 10, 30, 0.08)');
            bgGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);

            // Блики
            flares.forEach(flare => {
                flare.x += flare.speedX;
                flare.y += flare.speedY;
                if (flare.x < -150) flare.x = width + 150;
                if (flare.x > width + 150) flare.x = -150;
                if (flare.y < -150) flare.y = height + 150;
                if (flare.y > height + 150) flare.y = -150;
                drawFlare(flare, time);
            });

            // Световые полосы
            lightStreaks.forEach(streak => {
                streak.x += streak.speed;
                streak.y += streak.speed * 0.3;
                if (streak.x < -200) streak.x = width + 200;
                if (streak.x > width + 200) streak.x = -200;
                if (streak.y < -200) streak.y = height + 200;
                if (streak.y > height + 200) streak.y = -200;
                drawLightStreak(streak, time);
            });

            // Соединяющие линии между близкими партиклами
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const alpha = (1 - dist / 150) * 0.1;
                        ctx.strokeStyle = `rgba(0, 200, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            // Партиклы
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
        
        // === ФУНКЦИИ МОДАЛЬНОГО ОКНА ===
        function openModal() {
            const modal = document.getElementById('authModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            const modal = document.getElementById('authModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModalOnOverlay(event) {
            if (event.target === event.currentTarget) {
                closeModal();
            }
        }
        
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab-button');
            const forms = document.querySelectorAll('.form-section');
            
            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            // Здесь будет логика входа
            console.log('Вход:', { email, password });
            alert('Функция входа будет реализована позже');
        }
        
        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            
            if (password !== confirm) {
                alert('Пароли не совпадают!');
                return;
            }
            
            // Здесь будет логика регистрации
            console.log('Регистрация:', { name, email, password });
            alert('Функция регистрации будет реализована позже');
        }
        
        // Закрытие по Escape
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>'''
